<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions&Answers</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/styles.css">
    <link rel="icon" href="img/qa.png" type="image/png">
</head>

<body class="d-flex flex-column min-vh-100">
<div class="container-fluid">
    
    <!-- HEADER -->
    <header class="d-flex align-items-center py-3 mb-4 border-bottom">
        <!-- Левый блок: логотип -->
        <a href="index" class="d-flex align-items-center gap-2 flex-shrink-0 text-decoration-none text-body">
            <img src="../static/img/qa.png" height="40" alt="Логотип">
            <span class="logo-text">Questions&Answers</span>
        </a>

        <!-- Центральный блок: поиск + кнопка Ask -->
        <div class="flex-grow-1 d-flex justify-content-center mx-3" style="max-width:800px;">
            <form class="d-flex w-100">
                <input class="form-control me-2" type="search" placeholder="Поиск по заголовку и содержимому">
                <a href="ask" class="btn btn-primary">Задать вопрос</a>
            </form>
        </div>
    
        <!-- Правый блок: юзерблок -->
        <div class="d-flex align-items-center gap-2 flex-shrink-0 style="min-height: 90px;">
            <img src="../static/img/avatar.jpg" alt="avatar" height="70" class="rounded-circle">
            <div class="d-flex flex-column">
                <span class="fw-bold">proGsa2026</span>
                <div>
                    <a href="#" class="text-decoration-none small me-2">Профиль</a>
                    <a href="#" class="text-decoration-none small text-danger">Выйти</a>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="mb-4">
        <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
            <h1 class="main-title mb-0">Профиль: proGsa2026</h1>
        </div>
        <div class="row g-3">
            <!-- Левая часть -->
            <div class="col-12 col-md-7 col-lg-8 d-flex flex-column gap-3">
                <div class="p-4" style="max-width: 650px; width: 100%;">
                    <form method="post" enctype="multipart/form-data">
                        <!-- {% csrf_token %}
             -->
                        <!-- Login -->
                        <div class="mb-3 d-flex align-items-center gap-3">
                            <label class="form-label form-label-custom mb-0" style=" min-width: 190px;">Login</label>
                            <input type="text" name="username"
                                   value="nastya_lobach"
                                   class="form-control form-label-custom-1"
                                   style="max-width: 450px;">
                        </div>
            
                        <!-- Email -->
                        <div class="mb-3 d-flex align-items-center gap-3">
                            <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Email</label>
                            <input type="email" name="email"
                                   value="nastya@lobach.info"
                                   class="form-control form-label-custom-1"
                                   style="max-width: 450px;">
                        </div>
            
                        <!-- Nickname -->
                        <div class="mb-3 d-flex align-items-center gap-3">
                            <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Nickname</label>
                            <input type="text" name="nickname"
                                   value="proGsa2026"
                                   class="form-control form-label-custom-1"
                                   style="max-width: 450px;">
                        </div>
            
                        <!-- Avatar -->
                        <div class="mb-3 d-flex align-items-start gap-3">
                            <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Avatar</label>
            
                            <div class="d-flex flex-column">
                                <!-- Текущий аватар -->
                                <img src="../static/img/avatar.jpg"
                                     alt="avatar"
                                     class="rounded mb-3"
                                     style="width: 130px; height: 130px; object-fit: cover;">
            
                                <!-- Загрузка -->
                                <input type="file" name="avatar"
                                       class="form-control"
                                       style="max-width: 450px;">
            
                                <!-- Подпись -->
                                <span class="small text-muted mt-1">
                                    Загрузите новый аватар
                                </span>
                            </div>
                        </div>
            
                        <!-- Кнопка -->
                        <div class="d-flex justify-content-center">
                            <button type="submit" class="btn btn-primary w-50">
                                Сохранить
                            </button>
                        </div>
            
                    </form>
            
                </div>
            </div>
            <!-- Правая часть -->
            <div class="col-12 col-md-5 col-lg-4 d-flex flex-column gap-3">
                <div class="p-3 popular-tags">
                    <p class="tag-title mb-2">Popular tags</p>
                    <p>
                        <a href="#" class="tag tag-red">perl</a>
                        <a href="#" class="tag tag-blue">python</a>
                        <a href="#" class="tag tag-green">vk.ru</a>
                        <a href="#" class="tag tag-yellow">iu7</a>
                        <a href="#" class="tag tag-orange">mail.ru</a>
                        <a href="#" class="tag tag-pink">javascript</a>
                        <a href="#" class="tag tag-cyan">html5</a>
                        <a href="#" class="tag tag-rubin">css3</a>
                        <a href="#" class="tag tag-indigo">docker</a>
                        <a href="#" class="tag tag-red">github.com</a>
                    </p>
                </div>
    
                <div class="p-3">
                    <p class="tag-title mb-2">Best members</p>
                    <p>
                        <a href="#" class="member-link">proGsa2026</a><br>
                        <a href="#" class="member-link">CyberNinja</a><br>
                        <a href="#" class="member-link">PixelWizard</a><br>
                        <a href="#" class="member-link">CodeMaster77</a><br>
                        <a href="#" class="member-link">TechGuru</a><br>
                        <a href="#" class="member-link">DevQueen</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
