<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions&Answers</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/styles.css">
    <link rel="icon" href="img/qa.png" type="image/png">
</head>


<body class="d-flex flex-column min-vh-100">

<div class="container-fluid">
    
    <!-- HEADER -->
    <header class="d-flex align-items-center py-3 mb-4 border-bottom">
        <!-- Левый блок: логотип -->
        <a href="index" class="d-flex align-items-center gap-2 flex-shrink-0 text-decoration-none text-body">
            <img src="../static/img/qa.png" height="40" alt="Логотип">
            <span class="logo-text">Questions&Answers</span>
        </a>
    
        <!-- Центральный блок: поиск + кнопка Ask -->
        <div class="flex-grow-1 d-flex justify-content-center mx-3" style="max-width:800px;">
            <form class="d-flex w-100">
                <input class="form-control me-2" type="search" placeholder="Поиск по заголовку и содержимому">
                <a href="ask" class="btn btn-primary">Задать вопрос</a>
            </form>
        </div>
    
        <!-- Правый блок: юзерблок -->
        <div class="d-flex align-items-center gap-2 flex-shrink-0 style="min-height: 90px;">
            <a href="#" class="btn btn-outline-primary btn-sm">Войти</a>
            <a href="#" class="btn btn-primary btn-sm">Регистрация</a>
        </div>
    </header>

    <!-- MAIN -->
    <main class="mb-4">
        <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
            <h1 class="main-title mb-0">Авторизация</h1>
        </div>
        <div class="row g-3">
            <!-- Левая часть -->
            <div class="col-12 col-md-7 col-lg-8 d-flex flex-column gap-3">
                <div class="p-4" style="max-width: 450px; width: 100%;">
                    <form method="post">
                        <!-- {% csrf_token %} -->
                        <!-- {% if form.errors %} -->
                            <!-- <div class="alert alert-danger py-2"> -->
                                <!-- Неверный логин или пароль -->
                            <!-- </div> -->
                        <!-- {% endif %} -->
            
                        <div class="mb-4 d-flex align-items-center gap-3">
                            <label class="form-label form-label-custom mb-0" style="min-width: 80px;">
                                Логин
                            </label>
                            <input type="text" name="username"
                                   class="form-control">
                                   <!-- value="{{ request.POST.username }}"> -->
                        </div>
            
                        <div class="mb-4 d-flex align-items-center gap-3">
                            <label class="form-label form-label-custom mb-0" style="min-width: 80px;">Пароль</label>
                            <input type="password" name="password"
                                   class="form-control">
                        </div>
            
                        <div class="d-flex justify-content-center">
                            <button type="submit" class="btn btn-primary w-50">
                                Войти
                            </button>
                        </div>
                    </form>
            
                    <div class="mt-3 d-flex justify-content-center">
                        <a href="#" class="small">Нет аккаунта? Регистрация</a>
                    </div>
                </div>
            </div>
            <!-- Правая часть -->
            <div class="col-12 col-md-5 col-lg-4 d-flex flex-column gap-3">
                <div class="p-3 popular-tags">
                    <p class="tag-title mb-2">Popular tags</p>
                    <p>
                        <a href="#" class="tag tag-red">perl</a>
                        <a href="#" class="tag tag-blue">python</a>
                        <a href="#" class="tag tag-green">vk.ru</a>
                        <a href="#" class="tag tag-yellow">iu7</a>
                        <a href="#" class="tag tag-orange">mail.ru</a>
                        <a href="#" class="tag tag-pink">javascript</a>
                        <a href="#" class="tag tag-cyan">html5</a>
                        <a href="#" class="tag tag-rubin">css3</a>
                        <a href="#" class="tag tag-indigo">docker</a>
                        <a href="#" class="tag tag-red">github.com</a>
                    </p>
                </div>
    
                <div class="p-3">
                    <p class="tag-title mb-2">Best members</p>
                    <p>
                        <a href="#" class="member-link">proGsa2026</a><br>
                        <a href="#" class="member-link">CyberNinja</a><br>
                        <a href="#" class="member-link">PixelWizard</a><br>
                        <a href="#" class="member-link">CodeMaster77</a><br>
                        <a href="#" class="member-link">TechGuru</a><br>
                        <a href="#" class="member-link">DevQueen</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"> 
        <div class="col-md-4 d-flex align-items-center"> 
            <a href="/" class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1" aria-label="Bootstrap"> 
                <svg class="bi" width="30" height="24" aria-hidden="true">
                    <use xlink:href="#bootstrap"></use>
                </svg> 
            </a>
            <span class="mb-3 mb-md-0 text-body-secondary">© 2026 made by proGsa</span> 
        </div> 
    </footer>
</div>
<script src="../static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
