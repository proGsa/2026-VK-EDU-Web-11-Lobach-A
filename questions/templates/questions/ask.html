{% extends "layout/base.html" %}
{% load static %}

{% block auth %}
<img src="{% static 'img/avatar.jpg' %}" alt="avatar" height="70" class="rounded-circle">
<div class="d-flex flex-column">
    <span class="fw-bold">proGsa2026</span>
    <div>
        <a href="{% url 'profile' %}" class="text-decoration-none small me-2">Профиль</a>
        <a href="{% url 'login' %}" class="text-decoration-none small text-danger">Выйти</a>
    </div>
</div>
{% endblock %}

{% block main %}
<h1 class="main-title mb-0">New Question</h1>
{% endblock %}


{% block left %}
<div class="col-12 col-md-7 col-lg-8 d-flex flex-column gap-3">
    <div class="p-4" style="max-width: 800px; width: 100%;">
        <form method="post">
            {% csrf_token %}

            <!-- Title -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 100px;">Title</label>
                <input type="text" name="title" 
                       value="{{ ask.question }}"
                       class="form-control form-label-custom-1" 
                       placeholder="Enter title">
            </div>

            <!-- Text -->
            <div class="mb-3 d-flex align-items-start gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 100px;">Text</label>
                <textarea name="text" class="form-control form-label-custom-1" 
                          rows="10" 
                          placeholder="{{ ask.explaination }}"></textarea>
            </div>

            <!-- Tags -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 100px;">Tags</label>
                <input type="text" name="tags" class="form-control form-label-custom-1" placeholder="moon park">
            </div>

            <!-- Button -->
            <div class="d-flex justify-content-center mt-4">
                <button type="submit" class="btn btn-primary w-40">
                    Задать вопрос
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
