{% extends "layout/base.html" %}
{% load static %}

{% block main %}
<h1 class="main-title mb-0">Профиль: {{ user.username }}</h1>
{% endblock %}

{% block auth %}
<img src="{% static 'img/avatar.jpg' %}" alt="avatar" height="70" class="rounded-circle">
<div class="d-flex flex-column">
    <span class="fw-bold">proGsa2026</span>
    <div>
        <a href="{% url 'profile' %}" class="text-decoration-none small me-2">Профиль</a>
        <a href="{% url 'login' %}" class="text-decoration-none small text-danger">Выйти</a>
    </div>
</div>
{% endblock %}

{% block left %}
<div class="col-12 col-md-7 col-lg-8 d-flex flex-column gap-3">
    <div class="p-4" style="max-width: 650px; width: 100%;">

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Login -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style=" min-width: 190px;">Login</label>
                <input type="text" name="username"
                       value="{{ user.username }}"
                       class="form-control form-label-custom-1"
                       style="max-width: 450px;">
            </div>

            <!-- Email -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Email</label>
                <input type="email" name="email"
                       value="{{ user.email }}"
                       class="form-control form-label-custom-1"
                       style="max-width: 450px;">
            </div>

            <!-- Nickname -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Nickname</label>
                <input type="text" name="nickname"
                       value="{{ user.nickname }}"
                       class="form-control form-label-custom-1"
                       style="max-width: 450px;">
            </div>

            <!-- Avatar -->
            <div class="mb-3 d-flex align-items-start gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Avatar</label>

                <div class="d-flex flex-column">
                    <!-- Текущий аватар -->
                    <img src="{% static user.avatar_url %}"
                         alt="avatar"
                         class="rounded mb-3"
                         style="width: 130px; height: 130px; object-fit: cover;">

                    <!-- Загрузка -->
                    <input type="file" name="avatar"
                           class="form-control"
                           style="max-width: 450px;">

                    <!-- Подпись -->
                    <span class="small text-muted mt-1">
                        Загрузите новый аватар
                    </span>
                </div>
            </div>

            <!-- Кнопка -->
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-primary w-50">
                    Сохранить
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
