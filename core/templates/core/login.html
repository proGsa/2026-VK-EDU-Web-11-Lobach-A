{% extends "layout/base.html" %}
{% load static %}

{% block main %}
<h1 class="main-title mb-0">Авторизация</h1>
{% endblock %}

{% block auth %}
<a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Войти</a>
<a href="{% url 'signup' %}" class="btn btn-primary btn-sm">Регистрация</a>
{% endblock %}

{% block left %}
<div class="col-12 col-md-7 col-lg-8 d-flex flex-column gap-3">
    <div class="p-4" style="max-width: 450px; width: 100%;">
        
        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger py-2">
                    Неверный логин или пароль
                </div>
            {% endif %}

            <div class="mb-4 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 80px;">
                    Логин
                </label>
                <input type="text" name="username"
                       class="form-control"
                       value="{{ user.login }}">
            </div>

            <div class="mb-4 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 80px;">Пароль</label>
                <input type="password" name="password" value="{{ user.password }}"
                       class="form-control">
            </div>

            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-primary w-50">
                    Войти
                </button>
            </div>
        </form>

        <div class="mt-3 d-flex justify-content-center">
            <a href="#" class="small">Нет аккаунта? Регистрация</a>
        </div>
    </div>
</div>
{% endblock %}
