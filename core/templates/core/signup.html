{% extends "layout/base.html" %}
{% load static %}
{% block main %}
<h1 class="main-title mb-0">Регистрация</h1>
{% endblock %}

{% block auth %}
<a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Войти</a>
<a href="{% url 'signup' %}" class="btn btn-primary btn-sm">Регистрация</a>
{% endblock %}

{% block left %}
<div class="col-12 col-md-7 col-lg-8 d-flex flex-column gap-3">
    <div class="p-4" style="max-width: 650px; width: 100%;">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% if email_error %}
                <div class="alert alert-danger py-2">
                    Sorry, this email is already registered
                </div>
            {% endif %}
            <!-- Login -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Login</label>
                <input type="text" name="username" value="{{ user.login }}" class="form-control" style="max-width: 250px;">
            </div>
    
            <!-- Email -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Email</label>
                <input type="email" name="email" value="{{ user.email }}" class="form-control" style="max-width: 250px;">
            </div>
    
            <!-- Nickname -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Nickname</label>
                <input type="text" name="nickname" value="{{ user.nickname }}" class="form-control" style="max-width: 250px;">
            </div>
    
            <!-- Password -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Password</label>
                <input type="password" name="password" value="{{ user.password }}" class="form-control" style="max-width: 250px;">
            </div>
    
            <!-- Repeat Password -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Repeat password</label>
                <input type="password" name="password_repeat" value="{{ user.password_repeat }}" class="form-control" style="max-width: 250px;">
            </div>
    
            <!-- Avatar -->
            <div class="mb-3 d-flex align-items-center gap-3">
                <label class="form-label form-label-custom mb-0" style="min-width: 190px;">Avatar</label>
                <input type="file" name="avatar" class="form-control" style="max-width: 250px;">
            </div>
    
            <!-- Button -->
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-primary w-50">
                    Зарегистрироваться
                </button>
            </div>
    
        </form>
    
        <div class="mt-3 text-center">
            <a href="{% url 'login' %}">Уже есть аккаунт? Войти</a>
        </div>
    </div>
    
</div>
{% endblock %}
